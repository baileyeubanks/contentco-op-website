services:
  - type: web
    name: contentco-op-codeliver
    runtime: node
    plan: free
    region: oregon
    branch: blaze-v4/codeliver-render-suite
    autoDeploy: true
    buildCommand: npm ci && npm run build -w co-deliver
    startCommand: npm run start -w co-deliver
    buildFilter:
      paths:
        - apps/codeliver/**
        - packages/**
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        value: https://contentco-op-codeliver.onrender.com
      - key: NEXT_PUBLIC_MONOREPO_URL
        value: https://github.com/baileyeubanks/blaze-v4
      - key: NEXT_PUBLIC_COCUT_URL
        value: https://contentco-op-cocut.onrender.com
      - key: NEXT_PUBLIC_COSCRIPT_URL
        value: https://contentco-op-coscript.onrender.com
      - key: NEXT_PUBLIC_CODELIVER_URL
        value: https://contentco-op-codeliver.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false

  - type: web
    name: contentco-op-coscript
    runtime: node
    plan: free
    region: oregon
    branch: blaze-v4/codeliver-render-suite
    autoDeploy: true
    buildCommand: npm ci && npm run build -w co-script
    startCommand: npm run start -w co-script
    buildFilter:
      paths:
        - apps/coscript/**
        - packages/**
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_MONOREPO_URL
        value: https://github.com/baileyeubanks/blaze-v4
      - key: NEXT_PUBLIC_COCUT_URL
        value: https://contentco-op-cocut.onrender.com
      - key: NEXT_PUBLIC_COSCRIPT_URL
        value: https://contentco-op-coscript.onrender.com
      - key: NEXT_PUBLIC_CODELIVER_URL
        value: https://contentco-op-codeliver.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: AI_MODEL
        value: claude-sonnet-4-20250514
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: contentco-op-cocut
    runtime: static
    plan: free
    region: oregon
    branch: blaze-v4/codeliver-render-suite
    autoDeploy: true
    buildCommand: npm ci && npm run build -w co-cut
    staticPublishPath: ./apps/cocut/dist
    buildFilter:
      paths:
        - apps/cocut/**
        - packages/**
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_MONOREPO_URL
        value: https://github.com/baileyeubanks/blaze-v4
      - key: VITE_COCUT_URL
        value: https://contentco-op-cocut.onrender.com
      - key: VITE_COSCRIPT_URL
        value: https://contentco-op-coscript.onrender.com
      - key: VITE_CODELIVER_URL
        value: https://contentco-op-codeliver.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_GOOGLE_API_KEY
        sync: false
      - key: VITE_ANTHROPIC_API_KEY
        sync: false
      - key: VITE_OPENAI_API_KEY
        sync: false
      - key: VITE_AI_PROXY_URL
        sync: false

previews:
  generation: auto_preview
